publish:
  provider: github
  owner: deusXmachina-dev
  repo: memorylane

appId: com.memorylane.app
productName: MemoryLane
copyright: Copyright © 2026 Filip Kubis

directories:
  buildResources: assets
  output: dist

files:
  - out/**/*
  - package.json

extraResources:
  - from: assets
    to: assets
    filter:
      - '**/*'
  - from: build/swift
    to: swift
    filter:
      - ocr
      - app-watcher
      - screenshot
  - from: src/main/processor/powershell
    to: powershell
    filter:
      - '*.ps1'
  - from: build/models
    to: models
    filter:
      - '**/*'

asar: true
asarUnpack:
  - 'node_modules/uiohook-napi/**/*'
  - 'node_modules/sharp/**/*'
  - 'node_modules/better-sqlite3/**/*'
  - 'node_modules/ffmpeg-static/**/*'
  - 'node_modules/sqlite-vec*/**/*'
  - 'node_modules/@img/**/*'
  - 'node_modules/onnxruntime-node/**/*'
  - '**/*.node'

afterSign: build/notarize.js

mac:
  notarize: false
  category: public.app-category.productivity
  extendInfo:
    LSUIElement: true
  identity: 'Filip Kubis (ZN3J54N7AP)'
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  artifactName: '${productName}-${arch}-mac.${ext}'
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64

win:
  extraResources:
    - from: build/rust
      to: rust
      filter:
        - app-watcher-windows.exe
        - screenshot-capturer-windows.exe
  azureSignOptions:
    publisherName: 'SenseFlow, Inc.'
    endpoint: 'https://eus.codesigning.azure.net/'
    certificateProfileName: 'memorylane-codesign'
    codeSigningAccountName: 'azure-signing-dxm'
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64

nsis:
  # Keep the installer filename explicit so latest.yml and the published
  # GitHub release asset name stay in sync.
  artifactName: '${productName}-Setup.${ext}'
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true

msi:
  # MSI is primarily for managed enterprise deployment, so default to
  # machine-wide installation.
  perMachine: true
  oneClick: true
  artifactName: '${productName}-Setup.${ext}'
