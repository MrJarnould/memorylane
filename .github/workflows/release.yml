name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to rebuild or republish
        required: true
        type: string

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-24.04
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check tag matches package version
        id: version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v$PACKAGE_VERSION"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Check macOS signing secrets
        run: |
          missing=0
          for name in MAC_CERT_BASE64 MAC_CERT_PASSWORD MAC_INSTALLER_CERT_BASE64 MAC_INSTALLER_CERT_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_INSTALLER_CERT_BASE64: ${{ secrets.MAC_INSTALLER_CERT_BASE64 }}
          MAC_INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Check Windows signing secrets
        run: |
          missing=0
          for name in AZURE_TENANT_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

  build-mac-customer:
    name: Build macOS Customer
    runs-on: macos-15
    needs: validate-release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import macOS signing certificates
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_INSTALLER_CERT_BASE64: ${{ secrets.MAC_INSTALLER_CERT_BASE64 }}
          MAC_INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
        run: |
          APP_CERT_PATH="$RUNNER_TEMP/memorylane-app-signing.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/memorylane-installer-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/memorylane-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$MAC_CERT_BASE64" | base64 --decode > "$APP_CERT_PATH"
          echo -n "$MAC_INSTALLER_CERT_BASE64" | base64 --decode > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_INSTALLER_CERT_PASSWORD" \
            -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/pkgbuild -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build signed macOS customer artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npm run make:customer:mac

      - name: Upload macOS customer release files
        uses: actions/upload-artifact@v6
        with:
          name: release-macos-customer-${{ env.RELEASE_TAG }}
          retention-days: 3
          if-no-files-found: error
          path: |
            dist/customer/MemoryLane-arm64-mac.dmg
            dist/customer/MemoryLane-arm64-mac.dmg.blockmap
            dist/customer/MemoryLane-arm64-mac.zip
            dist/customer/MemoryLane-arm64-mac.zip.blockmap
            dist/customer/latest-mac.yml

  build-mac-enterprise:
    name: Build macOS Enterprise
    runs-on: macos-15
    needs: validate-release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import macOS signing certificates
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_INSTALLER_CERT_BASE64: ${{ secrets.MAC_INSTALLER_CERT_BASE64 }}
          MAC_INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
        run: |
          APP_CERT_PATH="$RUNNER_TEMP/memorylane-app-signing.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/memorylane-installer-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/memorylane-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$MAC_CERT_BASE64" | base64 --decode > "$APP_CERT_PATH"
          echo -n "$MAC_INSTALLER_CERT_BASE64" | base64 --decode > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_INSTALLER_CERT_PASSWORD" \
            -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/pkgbuild -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build signed macOS enterprise artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npm run make:enterprise:mac

      - name: Upload macOS enterprise release files
        uses: actions/upload-artifact@v6
        with:
          name: release-macos-enterprise-${{ env.RELEASE_TAG }}
          retention-days: 3
          if-no-files-found: error
          path: |
            dist/enterprise/MemoryLane Enterprise-arm64-mac.pkg

  build-win-customer:
    name: Build Windows Customer
    runs-on: windows-2025
    needs: validate-release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build signed Windows customer artifacts
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npm run make:customer:win

      - name: Upload Windows customer release files
        uses: actions/upload-artifact@v6
        with:
          name: release-windows-customer-${{ env.RELEASE_TAG }}
          retention-days: 3
          if-no-files-found: error
          path: |
            dist/customer/MemoryLane-Setup.exe
            dist/customer/MemoryLane-Setup.exe.blockmap
            dist/customer/latest.yml

  build-win-enterprise:
    name: Build Windows Enterprise
    runs-on: windows-2025
    needs: validate-release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build signed Windows enterprise artifacts
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npm run make:enterprise:win

      - name: Upload Windows enterprise release files
        uses: actions/upload-artifact@v6
        with:
          name: release-windows-enterprise-${{ env.RELEASE_TAG }}
          retention-days: 3
          if-no-files-found: error
          path: |
            dist/enterprise/MemoryLane Enterprise-Setup.msi

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - validate-release
      - build-mac-customer
      - build-mac-enterprise
      - build-win-customer
      - build-win-enterprise

    steps:
      - name: Checkout tagged ref
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download macOS customer artifact
        uses: actions/download-artifact@v8
        with:
          name: release-macos-customer-${{ env.RELEASE_TAG }}
          path: release-assets/release-macos-customer-${{ env.RELEASE_TAG }}

      - name: Download macOS enterprise artifact
        uses: actions/download-artifact@v8
        with:
          name: release-macos-enterprise-${{ env.RELEASE_TAG }}
          path: release-assets/release-macos-enterprise-${{ env.RELEASE_TAG }}

      - name: Download Windows customer artifact
        uses: actions/download-artifact@v8
        with:
          name: release-windows-customer-${{ env.RELEASE_TAG }}
          path: release-assets/release-windows-customer-${{ env.RELEASE_TAG }}

      - name: Download Windows enterprise artifact
        uses: actions/download-artifact@v8
        with:
          name: release-windows-enterprise-${{ env.RELEASE_TAG }}
          path: release-assets/release-windows-enterprise-${{ env.RELEASE_TAG }}

      - name: Show release files
        run: find release-assets -type f | sort

      - name: Verify release files
        run: |
          MAC_DIR="release-assets/release-macos-customer-${RELEASE_TAG}"
          MAC_ENTERPRISE_DIR="release-assets/release-macos-enterprise-${RELEASE_TAG}"
          WIN_CUSTOMER_DIR="release-assets/release-windows-customer-${RELEASE_TAG}"
          WIN_ENTERPRISE_DIR="release-assets/release-windows-enterprise-${RELEASE_TAG}"

          test -f "$MAC_DIR/MemoryLane-arm64-mac.dmg"
          test -f "$MAC_DIR/MemoryLane-arm64-mac.dmg.blockmap"
          test -f "$MAC_DIR/MemoryLane-arm64-mac.zip"
          test -f "$MAC_DIR/MemoryLane-arm64-mac.zip.blockmap"
          test -f "$MAC_DIR/latest-mac.yml"
          test -f "$MAC_ENTERPRISE_DIR/MemoryLane Enterprise-arm64-mac.pkg"
          test -f "$WIN_CUSTOMER_DIR/MemoryLane-Setup.exe"
          test -f "$WIN_CUSTOMER_DIR/MemoryLane-Setup.exe.blockmap"
          test -f "$WIN_CUSTOMER_DIR/latest.yml"
          test -f "$WIN_ENTERPRISE_DIR/MemoryLane Enterprise-Setup.msi"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ needs.validate-release.outputs.is_prerelease == 'true' }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            release-assets/release-macos-customer-${{ env.RELEASE_TAG }}/MemoryLane-arm64-mac.dmg
            release-assets/release-macos-customer-${{ env.RELEASE_TAG }}/MemoryLane-arm64-mac.dmg.blockmap
            release-assets/release-macos-customer-${{ env.RELEASE_TAG }}/MemoryLane-arm64-mac.zip
            release-assets/release-macos-customer-${{ env.RELEASE_TAG }}/MemoryLane-arm64-mac.zip.blockmap
            release-assets/release-macos-customer-${{ env.RELEASE_TAG }}/latest-mac.yml
            release-assets/release-macos-enterprise-${{ env.RELEASE_TAG }}/MemoryLane Enterprise-arm64-mac.pkg
            release-assets/release-windows-customer-${{ env.RELEASE_TAG }}/MemoryLane-Setup.exe
            release-assets/release-windows-customer-${{ env.RELEASE_TAG }}/MemoryLane-Setup.exe.blockmap
            release-assets/release-windows-customer-${{ env.RELEASE_TAG }}/latest.yml
            release-assets/release-windows-enterprise-${{ env.RELEASE_TAG }}/MemoryLane Enterprise-Setup.msi

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-24.04
    needs: publish-release
    if: ${{ success() }}

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL is not set; skipping Discord notification."
            exit 0
          fi

          curl -fsSL \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"🚀 MemoryLane release ${RELEASE_TAG} is live: ${RELEASE_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"
